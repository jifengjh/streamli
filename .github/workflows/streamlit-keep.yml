name: Streamlit 自动唤醒

on:
  workflow_dispatch:
  repository_dispatch:
    types: [service-down-alert]
  schedule:
    - cron: '0 */12 * * *'

jobs:
  wakeup:
    runs-on: ubuntu-latest
    # 关键修改 1：增加内容写入权限，否则无法提交代码
    permissions:
      contents: write

    steps:
      - name: 检查触发事件
        run: |
          echo "Workflow triggered by: ${{ github.event_name }}"
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            echo "触发事件类型 (Event Type): ${{ github.event.action }}"
            echo "收到来自 Uptime Kuma 的下线通知，开始执行自动唤醒流程..."
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "工作流被手动触发，开始执行唤醒..."
          else
            echo "工作流由计划任务触发，开始执行唤醒..."
          fi

      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 安装 Chromium
        uses: browser-actions/setup-chromium@v2
        
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r keep/requirements.txt

      - name: 执行 Streamlit 唤醒脚本
        env:
          STREAMLIT_APP_URL: ${{ vars.STREAMLIT_APP_URL }}
        run: |
          python keep/streamlit-keep.py

      # 关键修改 2：增加自动提交步骤，防止 GitHub 认为仓库不活跃
      - name: 自动更新活跃记录 (Keepalive Commit)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          echo "Last active: $(date)" > keepalive.txt
          git add keepalive.txt
          # [skip ci] 确保这次提交不会再次触发该工作流，避免无限循环
          git commit -m "chore: keepalive update [skip ci]" || exit 0
          git push
